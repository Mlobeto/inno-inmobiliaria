# ============================================================
# deploy-frontend.yml
# Trigger: push a main con cambios en front/ o shared/
# Hace: build Vite → deploy a Azure Static Web Apps
# ============================================================
name: Deploy Frontend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'front/**'
      - 'shared/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      # Instalar shared primero (monorepo dependency)
      - name: Install shared dependencies
        working-directory: shared
        run: npm install --legacy-peer-deps

      # Instalar front
      - name: Install frontend dependencies
        working-directory: front
        run: npm install --legacy-peer-deps

      # Build con variable de entorno apuntando al backend en Azure
      - name: Build frontend
        working-directory: front
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      # Copiar TinyMCE local al dist (evita el aviso de dominio no registrado)
      - name: Copy TinyMCE to dist
        run: cp -r front/node_modules/tinymce front/dist/tinymce

      # Verificar que el build generó archivos
      - name: Verify build output
        run: ls -la front/dist/

      # Deploy a Static Web Apps
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: 'upload'
          app_location: 'front/dist'
          output_location: ''
          skip_app_build: true
