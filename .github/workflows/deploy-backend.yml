# ============================================================
# deploy-backend.yml
# Trigger: push a main con cambios en back/ o infra/
# Hace: build Docker → push a GHCR → actualiza Container App
# ============================================================
name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'back/**'
      - 'shared/**'
      - 'infra/**'
      - '.github/workflows/deploy-backend.yml'
      - '.dockerignore'

env:
  AZURE_RESOURCE_GROUP: inno-prod-rg
  CONTAINER_APP_NAME: inno-prod-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG=ghcr.io/${OWNER}/inno-api:${{ github.sha }}
          docker build \
            -f back/Dockerfile \
            -t $IMAGE_TAG \
            -t ghcr.io/${OWNER}/inno-api:latest \
            .
          docker push $IMAGE_TAG
          docker push ghcr.io/${OWNER}/inno-api:latest
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Wait for Azure idle
        run: |
          echo "Esperando que Azure no tenga operaciones en curso..."
          for i in $(seq 1 90); do
            STATE=$(az containerapp show \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "properties.provisioningState" \
              --output tsv 2>/dev/null || echo "Unknown")
            echo "Intento $i/90 — provisioningState: $STATE"
            # Failed es normal tras una revisión rota — la app sigue en la revisión anterior.
            # Solo esperamos mientras hay una operación activa (InProgress / Updating).
            case "$STATE" in
              Succeeded|Failed|Canceled)
                echo "Estado terminal ($STATE) — continuando deploy."
                exit 0
                ;;
              InProgress|Updating|Provisioning)
                sleep 20
                ;;
              *)
                echo "Estado desconocido ($STATE) — continuando."
                exit 0
                ;;
            esac
            if [ "$i" -eq 90 ]; then
              echo "Timeout esperando fin de operación (último: $STATE). Intentando deploy igual..."
              exit 0
            fi
          done

      - name: Deactivate failed revisions
        continue-on-error: true
        run: |
          FAILED=$(az containerapp revision list \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "[?properties.runningState=='Failed'].name" \
            --output tsv)
          for REV in $FAILED; do
            echo "Desactivando revisión fallida: $REV"
            az containerapp revision deactivate \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --revision "$REV" || true
          done
          if [ -z "$FAILED" ]; then
            echo "Sin revisiones Failed — OK."
          else
            echo "Esperando 30s tras desactivar revisiones fallidas..."
            sleep 30
          fi

      - name: Record revision before deploy
        id: rev
        run: |
          PRE=$(az containerapp revision list \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "sort_by(@, &properties.createdTime)[-1].name" \
            --output tsv)
          PRE_IMAGE=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.template.containers[0].image" \
            --output tsv)
          echo "pre_revision=$PRE" >> $GITHUB_OUTPUT
          echo "pre_image=$PRE_IMAGE" >> $GITHUB_OUTPUT
          echo "Revisión previa: $PRE"
          echo "Imagen previa: $PRE_IMAGE"
          echo "Imagen objetivo: ${{ env.IMAGE_TAG }}"

      # Solo lectura — registry remove/set bloquean ~20 min en Azure CLI
      - name: Check container registries
        run: |
          echo "Registros configurados:"
          az containerapp registry list \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            -o table || true
          HAS_GHCR=$(az containerapp registry list \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "[?server=='ghcr.io'] | length(@)" -o tsv 2>/dev/null || echo "0")
          if [ "$HAS_GHCR" = "0" ]; then
            echo "ERROR: ghcr.io no está configurado. Agregalo en Azure Portal → Container App → Registries."
            exit 1
          fi
          echo "ghcr.io OK — continuando deploy."
          if az containerapp registry list \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "[?server=='innoacrprod.azurecr.io'] | length(@)" -o tsv 2>/dev/null | grep -qv '^0$'; then
            echo "WARN: innoacrprod.azurecr.io sigue listado — quitarlo manualmente en Portal (no bloquear CI)."
          fi

      - name: Deploy to Container Apps
        run: |
          PRE_IMAGE="${{ steps.rev.outputs.pre_image }}"
          SHA="${{ github.sha }}"
          for i in $(seq 1 40); do
            echo "Deploy intento $i/40..."
            if OUT=$(az containerapp update \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --container-name api \
              --image ${{ env.IMAGE_TAG }} \
              --command "node" \
              --args "index.js" \
              --no-wait 2>&1); then
              echo "$OUT"
              break
            fi
            echo "$OUT"
            if echo "$OUT" | grep -qi "ContainerAppOperationInProgress"; then
              echo "Operación en curso, reintentando en 30s..."
              sleep 30
              continue
            fi
            echo "Error no recuperable en deploy."
            exit 1
          done

          echo "Esperando que Azure aplique la imagen nueva (hasta 20 min)..."
          for i in $(seq 1 80); do
            PROV=$(az containerapp show \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "properties.provisioningState" -o tsv 2>/dev/null || echo "?")
            CUR=$(az containerapp show \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "properties.template.containers[0].image" -o tsv 2>/dev/null || echo "?")
            echo "Intento $i/80 — provisioning=$PROV imagen=$CUR"
            if echo "$CUR" | grep -qF "$SHA" || [ "$CUR" = "${{ env.IMAGE_TAG }}" ]; then
              echo "Imagen GHCR aplicada en template."
              exit 0
            fi
            if [ "$PROV" = "Failed" ] && [ "$i" -gt 3 ]; then
              echo "Deploy falló en Azure. Logs:"
              az containerapp logs show \
                --name ${{ env.CONTAINER_APP_NAME }} \
                --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
                --tail 50 || true
              exit 1
            fi
            sleep 15
          done
          echo "ERROR: La imagen sigue siendo $PRE_IMAGE — Azure no aplicó GHCR."
          exit 1

      - name: Verify deployment
        run: |
          API_URL="https://inno-prod-api.proudmoss-fef6994b.eastus2.azurecontainerapps.io"
          echo "Esperando que la API responda en $API_URL (hasta 10 min)..."
          sleep 45
          for i in $(seq 1 40); do
            echo "Intento $i/40"
            HEALTH=$(curl -s -m 15 "$API_URL/health" || true)
            if echo "$HEALTH" | grep -q '"status":"OK"'; then
              echo "Health OK: $HEALTH"
              MODULES=$(curl -s -m 15 "$API_URL/api/public/modules" || true)
              if echo "$MODULES" | grep -q '"modules"'; then
                echo "Modules OK"
                exit 0
              fi
              if echo "$MODULES" | grep -q '"success":true'; then
                echo "Modules OK"
                exit 0
              fi
              echo "Health OK pero /modules aún no: ${MODULES:0:120}"
            else
              echo "Sin health aún (${HEALTH:0:80})"
            fi
            sleep 15
          done
          echo "Timeout — últimos logs:"
          az containerapp logs show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --tail 40 || true
          exit 1
