# ============================================================
# deploy-backend.yml
# Trigger: push a main con cambios en back/ o infra/
# Hace: build Docker → push a GHCR → actualiza Container App
# ============================================================
name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'back/**'
      - 'shared/**'
      - 'infra/**'
      - '.github/workflows/deploy-backend.yml'
      - '.dockerignore'

env:
  AZURE_RESOURCE_GROUP: inno-prod-rg
  CONTAINER_APP_NAME: inno-prod-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG=ghcr.io/${OWNER}/inno-api:${{ github.sha }}
          docker build \
            -f back/Dockerfile \
            -t $IMAGE_TAG \
            -t ghcr.io/${OWNER}/inno-api:latest \
            .
          docker push $IMAGE_TAG
          docker push ghcr.io/${OWNER}/inno-api:latest
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Wait for Azure idle
        run: |
          echo "Esperando que Azure termine operaciones previas (hasta 30 min)..."
          for i in $(seq 1 90); do
            STATE=$(az containerapp show \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "properties.provisioningState" \
              --output tsv 2>/dev/null || echo "Unknown")
            echo "Intento $i/90 — provisioningState: $STATE"
            if [ "$STATE" = "Succeeded" ]; then
              echo "Container App listo."
              break
            fi
            if [ "$i" -eq 90 ]; then
              echo "Timeout esperando provisioningState=Succeeded (último: $STATE)"
              exit 1
            fi
            sleep 20
          done

      # Secrets ya configurados en el Container App — no re-sincronizar en cada deploy
      # (secret set bloquea ~20 min esperando provision). Para rotarlos: workflow manual
      # o az containerapp secret set desde Azure CLI local.

      - name: Deploy to Container Apps
        run: |
          # Solo actualizar imagen — no tocar env vars (secretref: en --set-env-vars
          # puede guardarse como literal y romper DATABASE_URL en revisiones nuevas).
          for i in $(seq 1 40); do
            echo "Deploy intento $i/40..."
            if OUT=$(az containerapp update \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --image ${{ env.IMAGE_TAG }} \
              --no-wait 2>&1); then
              echo "$OUT"
              echo "Deploy iniciado."
              exit 0
            fi
            echo "$OUT"
            if echo "$OUT" | grep -qi "ContainerAppOperationInProgress"; then
              echo "Operación en curso, reintentando en 30s..."
              sleep 30
              continue
            fi
            echo "Error no recuperable en deploy."
            exit 1
          done
          echo "Timeout: Azure siguió ocupado tras 40 reintentos."
          exit 1

      - name: Verify deployment
        run: |
          API_URL="https://inno-prod-api.proudmoss-fef6994b.eastus2.azurecontainerapps.io"
          echo "Esperando revisión activa..."
          sleep 30
          for i in $(seq 1 36); do
            STATE=$(az containerapp revision list \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "sort_by(@, &properties.createdTime)[-1].properties.runningState" \
              --output tsv 2>/dev/null || echo "Unknown")
            REV=$(az containerapp revision list \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "sort_by(@, &properties.createdTime)[-1].name" \
              --output tsv 2>/dev/null || echo "?")
            echo "Intento $i/36 — revisión $REV: ${STATE:-desconocido}"
            if [ "$STATE" = "Running" ]; then
              UPTIME=$(curl -sf "$API_URL/health" | python3 -c "import sys,json; print(json.load(sys.stdin).get('uptime',-1))" 2>/dev/null || echo "-1")
              echo "Health uptime: $UPTIME s"
              if [ "$UPTIME" != "-1" ] && [ "${UPTIME%%.*}" -lt 600 ]; then
                echo "Revisión nueva activa (uptime < 10 min)"
                exit 0
              fi
              echo "Revisión Running pero uptime alto — puede ser revisión vieja, esperando..."
            fi
            if [ "$STATE" = "Failed" ] || [ "$STATE" = "Degraded" ]; then
              echo "Revisión falló. Logs:"
              az containerapp logs show \
                --name ${{ env.CONTAINER_APP_NAME }} \
                --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
                --revision "$REV" \
                --tail 80 || true
              exit 1
            fi
            sleep 10
          done
          echo "Timeout. Logs recientes:"
          az containerapp logs show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --tail 80 || true
          exit 1
