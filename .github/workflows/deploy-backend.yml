# ============================================================
# deploy-backend.yml
# Trigger: push a main con cambios en back/ o infra/
# Hace: build Docker → push a GHCR → actualiza Container App
# ============================================================
name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'back/**'
      - 'shared/**'
      - 'infra/**'
      - '.github/workflows/deploy-backend.yml'
      - '.dockerignore'

env:
  AZURE_RESOURCE_GROUP: inno-prod-rg
  CONTAINER_APP_NAME: inno-prod-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write    # Necesario para OIDC login a Azure
      contents: read
      packages: write    # Necesario para push a GHCR

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Login a GitHub Container Registry con el token automático del workflow
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build y push de la imagen al GHCR
      - name: Build and push Docker image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG=ghcr.io/${OWNER}/inno-api:${{ github.sha }}
          docker build \
            -f back/Dockerfile \
            -t $IMAGE_TAG \
            -t ghcr.io/${OWNER}/inno-api:latest \
            .
          docker push $IMAGE_TAG
          docker push ghcr.io/${OWNER}/inno-api:latest
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "GHCR_OWNER=$OWNER" >> $GITHUB_ENV

      # Login a Azure usando Federated Identity (OIDC) — sin secretos de larga duración
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Esperar a que Azure termine operaciones previas y desplegar en un solo paso
      - name: Deploy to Container Apps
        run: |
          echo "Esperando que Azure termine operaciones previas..."
          for i in $(seq 1 30); do
            STATE=$(az containerapp show \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "properties.provisioningState" \
              --output tsv 2>/dev/null || echo "Unknown")
            echo "Intento $i/30 — provisioningState: $STATE"
            if [ "$STATE" = "Succeeded" ] || [ "$STATE" = "Failed" ]; then
              break
            fi
            sleep 10
          done

          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.IMAGE_TAG }} \
            --registry-server ghcr.io \
            --registry-username ${{ env.GHCR_OWNER }} \
            --registry-password ${{ secrets.GHCR_PAT }} \
            --secrets \
              "database-url=${{ secrets.DATABASE_URL }}" \
              "jwt-secret-key=${{ secrets.JWT_SECRET_KEY }}" \
              "encryption-key=${{ secrets.ENCRYPTION_KEY }}" \
              "mp-access-token=${{ secrets.MP_ACCESS_TOKEN }}" \
              "mp-public-key=${{ secrets.MP_PUBLIC_KEY }}" \
              "ml-client-secret=${{ secrets.ML_CLIENT_SECRET }}" \
            --set-env-vars \
              "NODE_ENV=production" \
              "PORT=3001" \
              "DATABASE_URL=secretref:database-url" \
              "JWT_SECRET_KEY=secretref:jwt-secret-key" \
              "ENCRYPTION_KEY=secretref:encryption-key" \
              "MP_ACCESS_TOKEN=secretref:mp-access-token" \
              "MP_PUBLIC_KEY=secretref:mp-public-key" \
              "BACKEND_URL=https://inno-prod-api.proudmoss-fef6994b.eastus2.azurecontainerapps.io" \
              "ML_CLIENT_SECRET=secretref:ml-client-secret" \
              "AZURE_STORAGE_ACCOUNT_NAME=innomediaprod" \
              "FRONTEND_URL=https://gestprop.com.ar" \
              "ML_CLIENT_ID=6081765459956502" \
              "ML_REDIRECT_URI=https://inno-prod-api.proudmoss-fef6994b.eastus2.azurecontainerapps.io/api/mercadolibre/callback" \
              "PLATFORM_ADMIN_EMAIL=admin@innoinmo.com" \
              "PLATFORM_ADMIN_EMAILS=admin@innoinmo.com" \
              "CONTACT_EMAIL=${{ secrets.CONTACT_EMAIL }}" \
              "ACS_SENDER_ADDRESS=DoNotReply@GestProps.com.ar" \
            --no-wait

      # Esperar a que la revisión quede activa (Azure puede tardar varios minutos)
      - name: Verify deployment
        run: |
          echo "Esperando revisión activa..."
          sleep 30
          for i in $(seq 1 36); do
            STATE=$(az containerapp revision list \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "sort_by(@, &properties.createdTime)[-1].properties.runningState" \
              --output tsv 2>/dev/null || echo "Unknown")
            echo "Intento $i/36 — última revisión: ${STATE:-desconocido}"
            if [ "$STATE" = "Running" ] || [ "$STATE" = "Processing" ]; then
              if [ "$STATE" = "Running" ]; then
                az containerapp show \
                  --name ${{ env.CONTAINER_APP_NAME }} \
                  --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
                  --query "properties.latestRevisionFqdn" \
                  --output tsv
                exit 0
              fi
            fi
            if [ "$STATE" = "Failed" ] || [ "$STATE" = "Degraded" ]; then
              echo "Revisión falló. Logs:"
              az containerapp logs show \
                --name ${{ env.CONTAINER_APP_NAME }} \
                --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
                --tail 80 || true
              exit 1
            fi
            sleep 10
          done
          echo "Timeout. Logs recientes:"
          az containerapp logs show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --tail 80 || true
          exit 1
