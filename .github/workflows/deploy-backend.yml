# ============================================================
# deploy-backend.yml
# Trigger: push a main con cambios en back/ o infra/
# Hace: build Docker → push a GHCR → actualiza Container App
# ============================================================
name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'back/**'
      - 'shared/**'
      - 'infra/**'
      - '.github/workflows/deploy-backend.yml'
      - '.dockerignore'

env:
  AZURE_RESOURCE_GROUP: inno-prod-rg
  CONTAINER_APP_NAME: inno-prod-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      packages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_TAG=ghcr.io/${OWNER}/inno-api:${{ github.sha }}
          docker build \
            -f back/Dockerfile \
            -t $IMAGE_TAG \
            -t ghcr.io/${OWNER}/inno-api:latest \
            .
          docker push $IMAGE_TAG
          docker push ghcr.io/${OWNER}/inno-api:latest
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "REVISION_SUFFIX=gh${{ github.run_number }}" >> $GITHUB_ENV

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Wait for Azure idle
        run: |
          echo "Esperando que Azure no tenga operaciones en curso..."
          for i in $(seq 1 90); do
            STATE=$(az containerapp show \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "properties.provisioningState" \
              --output tsv 2>/dev/null || echo "Unknown")
            echo "Intento $i/90 — provisioningState: $STATE"
            # Failed es normal tras una revisión rota — la app sigue en la revisión anterior.
            # Solo esperamos mientras hay una operación activa (InProgress / Updating).
            case "$STATE" in
              Succeeded|Failed|Canceled)
                echo "Estado terminal ($STATE) — continuando deploy."
                exit 0
                ;;
              InProgress|Updating|Provisioning)
                sleep 20
                ;;
              *)
                echo "Estado desconocido ($STATE) — continuando."
                exit 0
                ;;
            esac
            if [ "$i" -eq 90 ]; then
              echo "Timeout esperando fin de operación (último: $STATE). Intentando deploy igual..."
              exit 0
            fi
          done

      - name: Deactivate failed revisions
        continue-on-error: true
        run: |
          FAILED=$(az containerapp revision list \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "[?properties.runningState=='Failed'].name" \
            --output tsv)
          for REV in $FAILED; do
            echo "Desactivando revisión fallida: $REV"
            az containerapp revision deactivate \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --revision "$REV" || true
          done
          if [ -n "$FAILED" ]; then
            echo "Esperando 30s tras desactivar revisiones fallidas..."
            sleep 30
          fi

      - name: Record revision before deploy
        id: rev
        run: |
          PRE=$(az containerapp revision list \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "sort_by(@, &properties.createdTime)[-1].name" \
            --output tsv)
          PRE_IMAGE=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.template.containers[0].image" \
            --output tsv)
          echo "pre_revision=$PRE" >> $GITHUB_OUTPUT
          echo "pre_image=$PRE_IMAGE" >> $GITHUB_OUTPUT
          echo "Revisión previa: $PRE"
          echo "Imagen previa: $PRE_IMAGE"
          echo "Imagen objetivo: ${{ env.IMAGE_TAG }}"

      - name: Deploy to Container Apps
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "ERROR: Falta el secret DATABASE_URL en GitHub (Settings → Secrets)."
            exit 1
          fi

          # Reparar DATABASE_URL (secretref: literal rompe Prisma) y forzar arranque sin migrate
          for i in $(seq 1 40); do
            echo "Deploy intento $i/40..."
            if OUT=$(az containerapp update \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --container-name api \
              --image ${{ env.IMAGE_TAG }} \
              --revision-suffix "${{ env.REVISION_SUFFIX }}" \
              --command "node" \
              --args "index.js" \
              --set-env-vars "DATABASE_URL=$DATABASE_URL" \
              --no-wait 2>&1); then
              echo "$OUT"
              echo "Deploy iniciado."
              exit 0
            fi
            echo "$OUT"
            if echo "$OUT" | grep -qi "ContainerAppOperationInProgress"; then
              echo "Operación en curso, reintentando en 30s..."
              sleep 30
              continue
            fi
            echo "Error no recuperable en deploy."
            exit 1
          done
          echo "Timeout: Azure siguió ocupado tras 40 reintentos."
          exit 1

      - name: Verify deployment
        run: |
          API_URL="https://inno-prod-api.proudmoss-fef6994b.eastus2.azurecontainerapps.io"
          TARGET_IMAGE="${{ env.IMAGE_TAG }}"
          SHA="${{ github.sha }}"
          PRE_IMAGE="${{ steps.rev.outputs.pre_image }}"
          echo "Esperando imagen $TARGET_IMAGE (previa: $PRE_IMAGE)..."
          sleep 30
          for i in $(seq 1 60); do
            CUR_IMAGE=$(az containerapp show \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "properties.template.containers[0].image" \
              --output tsv 2>/dev/null || echo "?")
            REV=$(az containerapp revision list \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "sort_by(@, &properties.createdTime)[-1].name" \
              --output tsv 2>/dev/null || echo "?")
            STATE=$(az containerapp revision list \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
              --query "sort_by(@, &properties.createdTime)[-1].properties.runningState" \
              --output tsv 2>/dev/null || echo "Unknown")

            IMAGE_OK=false
            if [ "$CUR_IMAGE" = "$TARGET_IMAGE" ]; then IMAGE_OK=true; fi
            if echo "$CUR_IMAGE" | grep -qF "$SHA"; then IMAGE_OK=true; fi

            echo "Intento $i/60 — rev $REV ($STATE) imagen: $CUR_IMAGE (ok=$IMAGE_OK)"

            if [ "$IMAGE_OK" = false ]; then
              sleep 15
              continue
            fi

            if [ "$STATE" = "Failed" ] || [ "$STATE" = "Degraded" ]; then
              echo "Revisión falló tras deploy. Logs:"
              az containerapp logs show \
                --name ${{ env.CONTAINER_APP_NAME }} \
                --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
                --revision "$REV" \
                --tail 80 || true
              exit 1
            fi

            if [ "$STATE" != "Running" ]; then
              sleep 15
              continue
            fi

            UPTIME=$(curl -sf "$API_URL/health" | python3 -c "import sys,json; print(json.load(sys.stdin).get('uptime',-1))" 2>/dev/null || echo "-1")
            echo "Health uptime: $UPTIME s"

            if curl -sf "$API_URL/api/public/modules" | grep -q '"name"'; then
              echo "Deploy OK — /api/public/modules responde."
              exit 0
            fi

            if [ "$UPTIME" != "-1" ] && [ "${UPTIME%%.*}" -lt 600 ]; then
              echo "Deploy OK — uptime bajo ($UPTIME s)."
              exit 0
            fi

            echo "Imagen desplegada, esperando health/modules..."
            sleep 15
          done
          echo "Timeout. Imagen actual: $CUR_IMAGE"
          az containerapp logs show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --tail 80 || true
          exit 1
