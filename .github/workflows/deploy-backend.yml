# ============================================================
# deploy-backend.yml
# Trigger: push a main con cambios en back/ o infra/
# Hace: build Docker → push a ACR → actualiza Container App
# ============================================================
name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'back/**'
      - 'infra/**'
      - '.github/workflows/deploy-backend.yml'

env:
  AZURE_RESOURCE_GROUP: inno-prod-rg
  ACR_NAME: innoacrprod
  CONTAINER_APP_NAME: inno-prod-api
  IMAGE_NAME: inno-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # Necesario para OIDC login a Azure
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Login a Azure usando Federated Identity (OIDC) — sin secretos de larga duración
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Login a Container Registry usando Managed Identity
      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      # Build y push usando ACR Tasks (se compila en Azure, sin depender de Docker Hub desde el runner)
      - name: Build and push Docker image via ACR Tasks
        run: |
          IMAGE_TAG=${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --image ${{ env.IMAGE_NAME }}:latest \
            ./back
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      # Registrar/actualizar los secretos en el Container App desde GitHub Secrets.
      # az containerapp secret set hace upsert: crea si no existen, actualiza si ya existen.
      - name: Sync secrets to Container App
        run: |
          az containerapp secret set \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --secrets \
              "jwt-secret-key=${{ secrets.JWT_SECRET_KEY }}" \
              "encryption-key=${{ secrets.ENCRYPTION_KEY }}" \
              "mp-access-token=${{ secrets.MP_ACCESS_TOKEN }}" \
              "mp-public-key=${{ secrets.MP_PUBLIC_KEY }}" \
              "ml-client-secret=${{ secrets.ML_CLIENT_SECRET }}"

      # Actualizar la imagen en Container Apps y referenciar secrets como env vars
      - name: Deploy to Container Apps
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --image ${{ env.IMAGE_TAG }} \
            --set-env-vars \
              "NODE_ENV=production" \
              "PORT=3001" \
              "DATABASE_URL=secretref:database-url" \
              "JWT_SECRET_KEY=secretref:jwt-secret-key" \
              "ENCRYPTION_KEY=secretref:encryption-key" \
              "MP_ACCESS_TOKEN=secretref:mp-access-token" \
              "MP_PUBLIC_KEY=secretref:mp-public-key" \
              "ML_CLIENT_SECRET=secretref:ml-client-secret" \
              "AZURE_STORAGE_ACCOUNT_NAME=innomediaprod" \
              "FRONTEND_URL=https://yellow-mud-000b27d0f.6.azurestaticapps.net" \
              "ML_CLIENT_ID=6081765459956502" \
              "ML_REDIRECT_URI=https://inno-prod-api.proudmoss-fef6994b.eastus2.azurecontainerapps.io/api/mercadolibre/callback" \
              "PLATFORM_ADMIN_EMAIL=admin@innoinmo.com" \
              "PLATFORM_ADMIN_EMAILS=admin@innoinmo.com" \
              "CONTACT_EMAIL=${{ secrets.CONTACT_EMAIL }}" \
              "ACS_SENDER_ADDRESS=DoNotReply@gestionprops.com.ar"

      # Verificar que el deployment quedó activo
      - name: Verify deployment
        run: |
          az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --query "properties.latestRevisionFqdn" \
            --output tsv
